<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vaani Shuddha</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f7f6;
}

/* HERO SECTION */
.hero {
  text-align: center;
  padding: 80px 20px;
}

/* TOP BADGE */
.badge {
  display: inline-block;
  background: linear-gradient(145deg, #0f766e, #065f46);
  color: #fff;
  padding: 8px 18px;
  border-radius: 30px;
  font-size: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* MAIN HEADING (SHINE EFFECT) */
.hero h1 {
  font-size: 42px;
  margin: 20px 0;
  font-weight: bold;
  background: linear-gradient(90deg, #0f766e, #14b8a6, #0f766e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* SUB TEXT */
.subtext {
  font-size: 18px;
  color: #333;
  margin-bottom: 30px;
}

/* POINTS */
.points {
  margin: 20px 0;
  font-size: 16px;
  color: #444;
}

.points span {
  margin: 0 10px;
}

/* 3D BUTTON */
.cta-btn {
  display: inline-block;
  background: linear-gradient(145deg, #0f766e, #065f46);
  color: #fff;
  padding: 16px 32px;
  border-radius: 14px;
  font-size: 18px;
  text-decoration: none;
  font-weight: bold;
  
  box-shadow: 
    0 5px 0 #064e3b,
    0 10px 25px rgba(0,0,0,0.3),
    0 0 15px rgba(16,185,129,0.4);

  transition: all 0.2s ease;
}

/* HOVER EFFECT */
.cta-btn:hover {
  transform: scale(1.05);
}

/* CLICK EFFECT (REAL 3D) */
.cta-btn:active {
  transform: translateY(4px);
  box-shadow: 
    0 2px 0 #064e3b,
    0 5px 15px rgba(0,0,0,0.25);
}
</style>

</head>
<body>

<div class="hero">

  <div class="badge">⭐ 100+ लोगों ने भरोसा किया</div>

  <h1>
    हकलाने / तुतलाने की समस्या से परेशान हैं,<br>
    तो अब इंतजार न करें —<br>
    आज ही शुरुआत करें।
  </h1>

  <div class="points">
    ✓ बोलने से पहले घबराहट कम करें  
    <span>|</span>
    ✓ सांस और शब्दों का बेहतर तालमेल  
    <span>|</span>
    ✓ आत्मविश्वास बढ़ाएं  
    <span>|</span>
    ✓ 100% आयुर्वेदिक समाधान  
  </div>

  <br>

  <a href="https://wa.me/918239828901" class="cta-btn">
    📲 WhatsApp पर पूरी जानकारी लें
  </a>

</div>

</body>
</html>
