<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vaanishuddha</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #ffffff;
}

/* Header Section */
.header {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 20px;
    background: linear-gradient(135deg, #ffffff, #f5fdfc);
}

/* Glass Effect Box */
.header-box {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 40px 25px;
    box-shadow: 
        0 10px 30px rgba(0,0,0,0.08),
        inset 0 1px 1px rgba(255,255,255,0.6);
    max-width: 900px;
}

/* Main Heading */
.header h1 {
    font-size: 38px;
    line-height: 1.4;
    color: #0b635b;
    font-weight: 800;
    margin-bottom: 15px;
}

/* Highlight Text */
.highlight {
    color: #000;
    background: linear-gradient(120deg, #0b635b20, #0b635b40);
    padding: 5px 10px;
    border-radius: 8px;
}

/* Sub Text */
.header p {
    font-size: 18px;
    color: #444;
    margin-bottom: 25px;
}

/* CTA Button */
.btn {
    background: #0b635b;
    color: #fff;
    padding: 14px 28px;
    border-radius: 50px;
    text-decoration: none;
    font-size: 18px;
    font-weight: 600;
    display: inline-block;
    transition: 0.3s;
    box-shadow: 0 8px 20px rgba(11, 99, 91, 0.3);
}

.btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 25px rgba(11, 99, 91, 0.4);
}
</style>

</head>

<body>

<section class="header">
    <div class="header-box">

        <h1>
            <span class="highlight">हकलाने / तुतलाने</span> की समस्या से परेशान हैं,<br>
            तो अब इंतजार न करें — <br>आज ही शुरुआत करें।
        </h1>

        <p>
            अब बिना झिझक, बिना डर — खुलकर बोलें 💬
        </p>

        <a href="#" class="btn">WhatsApp पर जानकारी लें</a>

    </div>
</section>

</body>
</html>
