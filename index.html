<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vaanishuddha</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #ffffff;
}

/* Section */
.hero {
    text-align: center;
    padding: 80px 20px;
}

/* Top Badge */
.badge {
    display: inline-block;
    background: linear-gradient(135deg, #0b635b, #0f8f84);
    color: #fff;
    padding: 10px 22px;
    border-radius: 30px;
    font-size: 14px;
    margin-bottom: 25px;
    box-shadow: 0 8px 20px rgba(11,99,91,0.25);
}

/* Main Heading */
.hero h1 {
    font-size: 44px;
    font-weight: 800;
    line-height: 1.4;
    color: #0b635b;
    max-width: 900px;
    margin: auto;
}

/* Sub points */
.points {
    margin-top: 20px;
    color: #444;
    font-size: 16px;
}

.points span {
    margin: 0 10px;
}

/* CTA Button */
.cta-btn {
    margin-top: 35px;
    display: inline-block;
    background: linear-gradient(135deg, #0b635b, #0f8f84);
    color: white;
    padding: 16px 32px;
    border-radius: 10px;
    font-size: 18px;
    font-weight: 600;
    text-decoration: none;
    box-shadow: 0 10px 25px rgba(11,99,91,0.3);
    transition: 0.3s;
}

.cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 30px rgba(11,99,91,0.4);
}
</style>

</head>

<body>

<section class="hero">

    <!-- Badge -->
    <div class="badge">
        ⭐ 100+ लोगों ने भरोसा किया | बेहतर बोलने का अनुभव
    </div>

    <!-- Heading -->
    <h1>
        हकलाने / तुतलाने की समस्या से परेशान हैं,<br>
        तो अब इंतजार न करें —<br>
        आज ही शुरुआत करें।
    </h1>

    <!-- Points -->
    <div class="points">
        ✔ बोलने से पहले घबराहट कम करे 
        <span>|</span>
        ✔ सांस और शब्दों का बेहतर तालमेल 
        <span>|</span>
        ✔ आत्मविश्वास बढ़ाए 
        <span>|</span>
        ✔ 100% आयुर्वेदिक समाधान
    </div>

    <!-- CTA -->
    <a href="#" class="cta-btn">
        📲 WhatsApp पर पूरी जानकारी लें
    </a>

</section>

</body>
</html>
