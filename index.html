<!-- ===== 🎥 VIDEO SECTION START ===== -->

<style>
.video-section {
  padding: 30px 12px;
  background: #ffffff;
}

/* HEADING */
.video-heading {
  font-size: 32px;
  font-weight: 800;
  text-align: center;
  line-height: 1.3;
}

/* VIDEO FRAME */
.video-container {
  position: relative;
  width: 100%;
  max-width: 998px;   /* 🔥 Desktop limit */
  margin: 20px auto;

  aspect-ratio: 1 / 1;  /* 🔥 998×1000 approx square */
  background: #000;
  border-radius: 14px;
  overflow: hidden;
}

/* VIDEO */
.video-container video {
  width: 100%;
  height: 100%;
  object-fit: contain; /* no crop */
}

/* THUMBNAIL */
.video-overlay {
  position: absolute;
  inset: 0;
  background: url('YOUR-THUMBNAIL') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* PLAY BUTTON */
.play-btn {
  width: 90px;
  height: 90px;
  background: rgba(0,0,0,0.6);
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.play-btn::after {
  content: '';
  border-style: solid;
  border-width: 18px 0 18px 28px;
  border-color: transparent transparent transparent #fff;
}

/* RED TEXT */
.video-text {
  position: absolute;
  bottom: 20px;
  width: 100%;
  text-align: center;
  font-size: 26px;
  font-weight: 900;
  color: red;
  padding: 0 10px;
}
</style>

<section class="video-section">

  <div class="video-heading">
    क्या आप भी हकलाने से परेशान हैं?
  </div>

  <div class="video-container">

    <video id="video" playsinline>
      <source src="YOUR-VIDEO.mp4" type="video/mp4">
    </video>

    <div class="video-overlay" onclick="playVideo()">
      <div class="play-btn"></div>
    </div>

    <div class="video-text">
      हकलाना ठीक करने का आसान तरीका
    </div>

  </div>

</section>

<script>
function playVideo() {
  document.getElementById("video").play();
  document.querySelector(".video-overlay").style.display = "none";
}
</script>

<!-- ===== 🎥 VIDEO SECTION END ===== -->
